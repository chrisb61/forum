name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: forum_test
          POSTGRES_USER: forum
          POSTGRES_PASSWORD: forum_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://forum:forum_password@localhost:5432/forum_test

      - name: Run migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://forum:forum_password@localhost:5432/forum_test

      - name: Run API tests
        run: npm run test --workspace=apps/api -- --coverage
        env:
          DATABASE_URL: postgresql://forum:forum_password@localhost:5432/forum_test
          JWT_SECRET: test-secret

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build Web
        run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile -t forum-api .

      - name: Build Web Docker image
        run: docker build -f apps/web/Dockerfile -t forum-web .
